[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20"]

[phases.install]
cmds = [
    "cd backend && pip install --break-system-packages -r requirements.txt",
    "npm install"
]

[phases.build]
cmds = [
    "npm run build",
    "cd backend && python manage.py collectstatic --noinput"
]

[start]
cmd = "cd backend && python manage.py migrate && gunicorn hr_management.wsgi --bind 0.0.0.0:$PORT --workers 3"
